  name: Build Docker Image

  on:
    push:
       branches: [ main ]

     #This workflow is triggered on a push to the main branch. It checks out the code, logs into Azure using credentials stored in GitHub Secrets, sets up Java, builds the application with Maven, and then builds a Docker image.
  permissions:
    id-token: write
    contents: read


  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repository
          uses: actions/checkout@v4
        
          # This step logs into Azure using the credentials stored in GitHub Secrets. This is necessary for any subsequent steps that interact with Azure services, such as pushing the Docker image to Azure Container Registry (ACR) or deploying to Azure Kubernetes Service (AKS).
        - name: Login to Azure
          uses: azure/login@v1
          with:
              #client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
              client-id: ${{ secrets.AZURE_CLIENT_ID }}
              tenant-id: ${{ secrets.AZURE_TENANT_ID }}
              subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        - name: Login to acr
          run: az acr login --name ${{ secrets.ACR_NAME }}

          #uses: azure/docker-login@v1
          #with:
              
            
              # login-server: ${{ secrets.ACR_LOGIN_SERVER }}
              # username: ${{ secrets.ACR_USERNAME }}
              # password: ${{ secrets.ACR_PASSWORD }}    

       

      
        # 1. This step installs Java so GitHub can run Maven
        - name: Set up JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: '25'
            distribution: 'temurin'
            cache: maven

        -  name: Grant execute permission for mvnw
           run: chmod +x mvnw

        # 2. This step creates the missing japp.jar file
        - name: Build with Maven
          run: ./mvnw clean package 
        - name: Build Docker image
          run: |  
            echo "${{ vars.APPLICATION_PROPERTIES }}" > application.properties  
            ls -la
            cat application.properties
            docker build -t netflix_backend:latest .

        - name: Docker push
          run: |
            docker build . -t <acrdemo01azure>.azurecr.io/netflix-backend:latest
            docker push <acrdemo01azure>.azurecr.io/netflix-backend:latest


