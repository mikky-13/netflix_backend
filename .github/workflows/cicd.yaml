  name: Build Docker Image

  on:
    push:
       branches: [ main , Mikky_Movies ] 

     #This workflow is triggered on a push to the main branch. It checks out the code, logs into Azure using credentials stored in GitHub Secrets, sets up Java, builds the application with Maven, and then builds a Docker image.
  permissions:
    id-token: write
    contents: read


  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repository
          uses: actions/checkout@v4
    
        - name: configure AWS credentials 
          uses: aws-actions/configure-aws-credentials@v1
          with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY}}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
              
        
              

        - name: Login to ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

          #uses: azure/docker-login@v1
          #with:
              
            
              # login-server: ${{ secrets.ACR_LOGIN_SERVER }}
              # username: ${{ secrets.ACR_USERNAME }}
              # password: ${{ secrets.ACR_PASSWORD }}    

       

      
        # 1. This step installs Java so GitHub can run Maven
        - name: Set up JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: '25'
            distribution: 'temurin'
            cache: maven

        -  name: Grant execute permission for mvnw
           run: chmod +x mvnw

        # 2. This step creates the missing japp.jar file
        - name: Build with Maven
          run: ./mvnw clean package 
        - name: Build Docker image
          run: |  
            echo "${{ vars.APPLICATION_PROPERTIES }}" > application.properties  
            # ls -la
            # cat application.properties
            docker build -t netflix_backend:latest .

        - name: Docker push
          run: |
            docker tag netflix_backend:latest ${{ secrets.AWS_ACCOUNT_ID}}.dkr.ecr.us-east-2.amazonaws.com/netflix_backend:${GITHUB_RUN_NUMBER}
            docker push ${{ secrets.AWS_ACCOUNT_ID}}.dkr.ecr.us-east-2.amazonaws.com/netflix_backend:${GITHUB_RUN_NUMBER}

